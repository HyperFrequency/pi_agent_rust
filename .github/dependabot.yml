version: 2
updates:
  # Bump the pinned upstream model-catalog source so picking up new models is a
  # version bump (handled with scripts/gen-model-catalog.mjs + the
  # model-catalog-drift workflow), not a manual edit. See gh #117 and
  # scripts/models.local.json "_README".
  - package-ecosystem: npm
    directory: /scripts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-name: "@earendil-works/pi-ai"
